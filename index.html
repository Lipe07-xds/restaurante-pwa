<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e63946" /> <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>Restaurante App</title>
</head>
<body class="bg-light">
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="display-5 fw-bold text-danger">Comanda Digital</h1>
      <p class="text-muted">Gerencie os pedidos das mesas em tempo real</p>
    </header>

    <section class="card shadow-sm mb-4">
      <div class="card-body">
        <h2 id="form-title" class="h4 mb-3">Novo Pedido</h2>
        <form id="order-form">
          <input type="hidden" id="order-id" />
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="customerName" class="form-label">Nome do Cliente</label>
              <input type="text" id="customerName" class="form-control" placeholder="Ex: João Silva" required />
            </div>
            <div class="col-md-6 mb-3">
              <label for="tableNumber" class="form-label">Mesa</label>
              <input type="number" id="tableNumber" class="form-control" placeholder="00" required />
            </div>
          </div>
          <div class="mb-3">
            <label for="orderItem" class="form-label">Prato / Bebida</label>
            <textarea id="orderItem" rows="2" class="form-control" placeholder="Ex: 1x Feijoada, 1x Suco de Laranja" required></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger w-100">Confirmar Pedido</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar</button>
          </div>
        </form>
        <p id="message" class="mt-3 mb-0 text-center fw-bold"></p>
      </div>
    </section>

    <section class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h4 mb-0">Cozinha / Pedidos Ativos</h2>
          <button id="reload-btn" class="btn btn-sm btn-outline-danger">Atualizar Lista</button>
        </div>
        <div id="orders-list" class="row"></div>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
